name: Auto PR on Commit

on:
  push:
    branches:
      - develop
      - feature/**
      - fix/**
      - docs/**
      - chore/**
    # Does not trigger on master branch pushes (not listed above)

permissions:
  contents: write
  pull-requests: write

jobs:
  create_pull_request:
    runs-on: ubuntu-latest
    name: Create PR from commit
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get branch info
        id: branch_info
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          
          # Extract latest commit message
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "commit_msg<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Extract commit subject (first line only) for PR title
          COMMIT_SUBJECT=$(git log -1 --pretty=%s)
          echo "commit_subject=$COMMIT_SUBJECT" >> $GITHUB_OUTPUT
          
          # Compare commits against master
          COMMIT_COUNT=$(git rev-list --count origin/master..HEAD 2>/dev/null || echo "0")
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          
          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only origin/master...HEAD 2>/dev/null || echo "Initial commit")
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Generate PR title - use conventional commit format if valid, otherwise derive from branch name
          if [[ "$COMMIT_SUBJECT" =~ ^(feat|fix|docs|style|refactor|test|chore|perf|ci|build|revert)(\(.+\))?:\ .+ ]]; then
            # Conventional commit detected - use as-is
            PR_TITLE="$COMMIT_SUBJECT"
          else
            # Not conventional - infer type from branch pattern
            if [[ "$BRANCH_NAME" == feature/* ]]; then
              SCOPE="${BRANCH_NAME#feature/}"
              PR_TITLE="feat($SCOPE): $COMMIT_SUBJECT"
            elif [[ "$BRANCH_NAME" == fix/* ]]; then
              SCOPE="${BRANCH_NAME#fix/}"
              PR_TITLE="fix($SCOPE): $COMMIT_SUBJECT"
            elif [[ "$BRANCH_NAME" == docs/* ]]; then
              SCOPE="${BRANCH_NAME#docs/}"
              PR_TITLE="docs($SCOPE): $COMMIT_SUBJECT"
            elif [[ "$BRANCH_NAME" == chore/* ]]; then
              SCOPE="${BRANCH_NAME#chore/}"
              PR_TITLE="chore($SCOPE): $COMMIT_SUBJECT"
            else
              # Default - use commit subject as-is
              PR_TITLE="$COMMIT_SUBJECT"
            fi
          fi
          
          echo "pr_title=$PR_TITLE" >> $GITHUB_OUTPUT

      - name: Check if PR already exists
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${{ steps.branch_info.outputs.branch_name }}"
          
          # Check if PR already exists for this branch
          PR_EXISTS=$(gh pr list --head "$BRANCH_NAME" --base master --json number --jq '.[0].number // empty')
          
          if [ -n "$PR_EXISTS" ]; then
            echo "pr_exists=true" >> $GITHUB_OUTPUT
            echo "pr_number=$PR_EXISTS" >> $GITHUB_OUTPUT
            echo "ℹ️ PR already exists: #$PR_EXISTS"
          else
            echo "pr_exists=false" >> $GITHUB_OUTPUT
            echo "✅ No existing PR found"
          fi

      - name: Create Pull Request
        if: steps.check_pr.outputs.pr_exists == 'false'
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${{ steps.branch_info.outputs.branch_name }}"
          COMMIT_MSG="${{ steps.branch_info.outputs.commit_msg }}"
          CHANGED_FILES="${{ steps.branch_info.outputs.changed_files }}"
          
          # Create PR body
          cat > pr_body.md <<EOF
          ## 🤖 Auto-Generated Pull Request
          
          **Branch:** \`$BRANCH_NAME\`
          **Latest Commit:** $COMMIT_MSG
          **Commit Count:** ${{ steps.branch_info.outputs.commit_count }}
          
          ### 📝 Changed Files
          \`\`\`
          $CHANGED_FILES
          \`\`\`
          
          ---
          *This PR was automatically created. PR-Agent review will start automatically.*
          EOF
          
          # Create PR with Conventional Commits format
          PR_TITLE="${{ steps.branch_info.outputs.pr_title }}"
          
          PR_URL=$(gh pr create \
            --base master \
            --head "$BRANCH_NAME" \
            --title "$PR_TITLE" \
            --body-file pr_body.md) || {
              # Retry with same title if error occurs
              PR_URL=$(gh pr create \
                --base master \
                --head "$BRANCH_NAME" \
                --title "$PR_TITLE" \
                --body-file pr_body.md)
          }
          
          # Try to add labels (continue even if labels don't exist)
          gh pr edit "$PR_URL" --add-label "automated" 2>/dev/null || echo "⚠️ Label 'automated' not found, skipping"
          gh pr edit "$PR_URL" --add-label "auto-pr" 2>/dev/null || echo "⚠️ Label 'auto-pr' not found, skipping"
          
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "✅ PR Created: $PR_URL"

      - name: Summary
        run: |
          if [ "${{ steps.check_pr.outputs.pr_exists }}" == "true" ]; then
            echo "ℹ️ PR already exists: #${{ steps.check_pr.outputs.pr_number }}"
          else
            echo "✅ New PR created: ${{ steps.create_pr.outputs.pr_url }}"
          fi
