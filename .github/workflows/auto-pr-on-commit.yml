name: Auto PR on Commit

on:
  push:
    branches:
      - develop
      - feature/**
      - fix/**
    # master branch'e direkt push'ları hariç tut
    branches-ignore:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  create_pull_request:
    runs-on: ubuntu-latest
    name: Create PR from commit
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get branch info
        id: branch_info
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          
          # Son commit mesajını al
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "commit_msg<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Değişen dosyaları al
          CHANGED_FILES=$(git diff --name-only HEAD~1 2>/dev/null || echo "Initial commit")
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.branch_info.outputs.branch_name }}
          base: master
          title: "🤖 Auto PR: ${{ steps.branch_info.outputs.branch_name }}"
          body: |
            ## 🤖 Otomatik Oluşturulan Pull Request
            
            **Branch:** `${{ steps.branch_info.outputs.branch_name }}`
            **Son Commit:** ${{ steps.branch_info.outputs.commit_msg }}
            
            ### 📝 Değişen Dosyalar
            ```
            ${{ steps.branch_info.outputs.changed_files }}
            ```
            
            ---
            *Bu PR otomatik olarak oluşturuldu. PR-Agent review'ı otomatik başlayacak.*
          labels: |
            automated
            auto-pr
          draft: false

      - name: Check outputs
        if: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          echo "✅ PR Created!"
          echo "PR Number: ${{ steps.cpr.outputs.pull-request-number }}"
          echo "PR URL: ${{ steps.cpr.outputs.pull-request-url }}"
          echo "Operation: ${{ steps.cpr.outputs.pull-request-operation }}"
